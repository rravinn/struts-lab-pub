#as it is, this file will only be triggered when a push occurs on main which I may decide to change
#because for testing, I need faster builds, and this whole implementation leads to long build times
#because it downloads all dependencies mentioned in Dockerfile
name: Build and Push Docker
on:
  push:
    branches: [ "main" ] #Triggers only when push to main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          # secretes.DOCKER_USERNAME is the username of the Docker Hub account, and github.event.repository.name is the name of the repository in GitHub, which will be used as the image name in Docker Hub
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest
